<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi người thương... ✨</title>
    <style>
        /* --- PHẦN GIAO DIỆN (CSS) --- */
        body {
            margin: 0;
            padding: 0;
            background-color: #111; /* Nền tối lãng mạn */
            color: #fff;
            font-family: 'Courier New', Courier, monospace; /* Font chữ kiểu máy đánh chữ */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 20px;
            z-index: 10;
        }

        /* Khung chứa chữ chạy */
        #text-box {
            font-size: 1.2rem;
            line-height: 1.8;
            min-height: 150px;
            margin-bottom: 30px;
            white-space: pre-line; /* Giữ nguyên xuống dòng */
        }

        /* Con trỏ nhấp nháy khi gõ chữ */
        .cursor {
            display: inline-block;
            background-color: #fff;
            width: 2px;
            height: 1.2rem;
            animation: blink 0.7s infinite;
            vertical-align: middle;
            margin-left: 2px;
        }

        @keyframes blink {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        /* Khu vực nút bấm */
        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .btn {
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #yes-btn {
            background-color: #ff4d6d;
            color: white;
            box-shadow: 0 0 15px rgba(255, 77, 109, 0.5);
        }

        #no-btn {
            background-color: #555;
            color: white;
            position: relative;
        }

        /* Hiệu ứng trái tim rơi */
        .heart {
            position: absolute;
            color: #ff4d6d;
            font-size: 15px;
            pointer-events: none;
            animation: fall linear forwards;
            opacity: 0.7;
        }

        @keyframes fall {
            0% {
                transform: translateY(-20px) rotate(0deg);
            }
            100% {
                transform: translateY(105vh) rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <!-- --- PHẦN KHUNG WEB (HTML) --- -->
    <div class="container">
        <!-- Chữ sẽ tự động gõ vào đây -->
        <div id="text-box"><span id="typed-text"></span><span class="cursor"></span></div>
        
        <!-- Các nút bấm tương tác -->
        <div class="buttons" id="btn-group">
            <button class="btn" id="yes-btn" onclick="selectYes()">Có chứ! ❤️</button>
            <button class="btn" id="no-btn" onmouseover="moveNoButton()" onclick="moveNoButton()">Không nha 😜</button>
        </div>
    </div>

    <!-- --- PHẦN XỬ LÝ HIỆU ỨNG (JAVASCRIPT) --- -->
    <script>
        // Nội dung bức thư (Bạn có thể tự do sửa nội dung ở đây)
        const message = `Chào em...\n
Gặp được em là điều tuyệt vời nhất đối với anh.\n
Chúc em có một tuổi mới thật hạnh phúc 🥰`;

        const typedTextElement = document.getElementById('typed-text');
        const btnGroup = document.getElementById('btn-group');
        let index = 0;

        // 1. Hàm tạo hiệu ứng gõ chữ tự động
        function typeEffect() {
            if (index < message.length) {
                typedTextElement.textContent += message.charAt(index);
                index++;
                // Tốc độ gõ chữ: 60ms mỗi ký tự (có thể chỉnh nhỏ hơn để chạy nhanh hơn)
                setTimeout(typeEffect, 60); 
            } else {
                // Khi gõ xong hết chữ thì hiện các nút bấm lên
                btnGroup.style.opacity = '1';
            }
        }

        // Bắt đầu chạy hiệu ứng gõ chữ khi tải xong trang
        window.onload = () => {
            typeEffect();
            setInterval(createHeart, 300); // Cứ 300ms tạo 1 trái tim rơi
        };

        // 2. Hàm xử lý khi di chuột vào nút "Không" -> Nút tự nhảy trốn
        function moveNoButton() {
            const noBtn = document.getElementById('no-btn');
            
            // Tính toán vị trí ngẫu nhiên trên màn hình nhưng tránh bị tràn mép
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 40) + 20;
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 40) + 20;
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        }

        // 3. Hàm xử lý khi bấm nút "Có"
        function selectYes() {
            //Ẩn con trỏ và nút bấm đi
            document.querySelector('.cursor').style.display = 'none';
            btnGroup.style.display = 'none';
            
            // Thay đổi nội dung hiển thị sang thông điệp hạnh phúc
            typedTextElement.textContent = "Cảm ơn cậu vì đã đồng ý! Mình biết ngay là cậu sẽ chọn 'Có' mà. Yêu cậu rất nhiều! 🥰❤️✨";
            
            // Tăng mật độ rơi trái tim cho rực rỡ
            setInterval(createHeart, 50);
        }

        // 4. Hàm tạo hiệu ứng trái tim rơi tự động
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            
            // Vị trí xuất hiện ngẫu nhiên theo chiều ngang
            heart.style.left = Math.random() * 100 + "vw";
            
            // Kích thước ngẫu nhiên cho tự nhiên
            const size = Math.random() * 15 + 10;
            heart.style.fontSize = size + "px";
            
            // Thời gian rơi ngẫu nhiên từ 3s đến 6s
            const duration = Math.random() * 3 + 3;
            heart.style.animationDuration = duration + "s";
            
            document.body.appendChild(heart);
            
            // Xóa trái tim sau khi rơi xong để tránh nặng máy
            setTimeout(() => {
                heart.remove();
            }, duration * 1000);
        }
    </script>
</body>
</html>
