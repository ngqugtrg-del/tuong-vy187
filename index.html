<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi người thương... ✨</title>
    <style>
        /* --- PHẦN GIAO DIỆN (CSS) --- */
        body {
            margin: 0;
            padding: 0;
            background-color: #111; /* Nền tối lãng mạn */
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 20px;
            z-index: 10;
        }

        /* KHUNG CHỨA ẢNH - MỚI THÊM */
        .photo-container {
            width: 150px; /* Độ rộng của ảnh */
            height: 150px; /* Độ cao của ảnh */
            margin: 0 auto 20px auto; /* Căn giữa và cách chữ bên dưới */
            border-radius: 50%; /* Làm ảnh hình tròn */
            overflow: hidden; /* Cắt các phần thừa của ảnh */
            border: 3px solid #ff4d6d; /* Viền hồng lãng mạn */
            box-shadow: 0 0 20px rgba(255, 77, 109, 0.6); /* Hiệu ứng tỏa sáng */
            opacity: 0; /* Mặc định ẩn, sẽ hiện sau */
            transition: opacity 1.5s ease; /* Hiệu ứng hiện dần */
        }

        .photo-container img {
            width: 100%; /* Ảnh lấp đầy khung */
            height: 100%;
            object-fit: cover; /* Đảm bảo ảnh không bị méo */
        }

        /* Khung chứa chữ chạy */
        #text-box {
            font-size: 1.2rem;
            line-height: 1.8;
            min-height: 150px;
            margin-bottom: 30px;
            white-space: pre-line;
        }

        /* Con trỏ nhấp nháy khi gõ chữ */
        .cursor {
            display: inline-block;
            background-color: #fff;
            width: 2px;
            height: 1.2rem;
            animation: blink 0.7s infinite;
            vertical-align: middle;
            margin-left: 2px;
        }

        @keyframes blink {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        /* Khu vực nút bấm */
        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .btn {
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        #yes-btn {
            background-color: #ff4d6d;
            color: white;
            box-shadow: 0 0 15px rgba(255, 77, 109, 0.5);
        }

        #no-btn {
            background-color: #555;
            color: white;
            position: relative; /* Quan trọng để nút nhảy trốn */
        }

        /* Hiệu ứng trái tim rơi */
        .heart {
            position: absolute;
            color: #ff4d6d;
            font-size: 15px;
            pointer-events: none;
            animation: fall linear forwards;
            opacity: 0.7;
        }

        @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg); }
            100% { transform: translateY(105vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="photo-container" id="photo-box">
            <img src="https://via.placeholder.com/150" alt="Ảnh kỷ niệm" id="profile-pic">
        </div>

        <div id="text-box"><span id="typed-text"></span><span class="cursor"></span></div>
        
        <div class="buttons" id="btn-group">
            <button class="btn" id="yes-btn" onclick="selectYes()">Có chứ! ❤️</button>
            <button class="btn" id="no-btn" onmouseover="moveNoButton()" onclick="moveNoButton()">Không nha 😜</button>
        </div>
    </div>

    <script>
        // Nội dung bức thư (Bạn có thể tự do sửa nội dung ở đây)
        const message = `Chào cậu...\n
Gặp được cậu là điều tuyệt vời nhất đối với mình.\n
Mình có một câu hỏi nhỏ này đã giấu trong lòng từ lâu rồi...\n
Cậu có đồng ý cùng mình đi tiếp chặng đường phía trước không? 🥰`;

        const typedTextElement = document.getElementById('typed-text');
        const btnGroup = document.getElementById('btn-group');
        const photoBox = document.getElementById('photo-box'); // Mới thêm
        let index = 0;

        // 1. Hàm tạo hiệu ứng gõ chữ tự động
        function typeEffect() {
            if (index < message.length) {
                typedTextElement.textContent += message.charAt(index);
                index++;
                // Tốc độ gõ chữ: 60ms mỗi ký tự
                setTimeout(typeEffect, 60); 
            } else {
                // Khi gõ xong hết chữ thì hiện các nút bấm lên
                btnGroup.style.opacity = '1';
            }
        }

        // Bắt đầu chạy hiệu ứng khi tải xong trang
        window.onload = () => {
            // Hiện ảnh dần dần lên trước khi gõ chữ
            photoBox.style.opacity = '1';
            
            // Đợi 1 giây sau khi ảnh hiện thì mới bắt đầu gõ chữ
            setTimeout(typeEffect, 1000);
            
            // Bắt đầu tạo trái tim rơi
            setInterval(createHeart, 300);
        };

        // 2. Hàm xử lý khi di chuột vào nút "Không" -> Nút tự nhảy trốn
        function moveNoButton() {
            const noBtn = document.getElementById('no-btn');
            
            // Tính toán vị trí ngẫu nhiên trên toàn màn hình
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 50) + 25;
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 50) + 25;
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        }

        // 3. Hàm xử lý khi bấm nút "Có"
        function selectYes() {
            // Ẩn con trỏ và nút bấm đi
            document.querySelector('.cursor').style.display = 'none';
            btnGroup.style.display = 'none';
            
            // Thay đổi nội dung hiển thị sang thông điệp hạnh phúc
            typedTextElement.textContent = "Cảm ơn cậu vì đã đồng ý! Mình biết ngay là cậu sẽ chọn 'Có' mà. Yêu cậu rất nhiều! 🥰❤️✨";
            
            // Tăng mật độ rơi trái tim cho rực rỡ
            setInterval(createHeart, 50);
        }

        // 4. Hàm tạo hiệu ứng trái tim rơi tự động
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            
            heart.style.left = Math.random() * 100 + "vw";
            const size = Math.random() * 15 + 10;
            heart.style.fontSize = size + "px";
            const duration = Math.random() * 3 + 3;
            heart.style.animationDuration = duration + "s";
            
            document.body.appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, duration * 1000);
        }
    </script>
</body>
</html>
